# Local backing services only (dev/prod parity per 12-factor + spec §5.4).
# In production, Postgres is managed RDS and Redis is Launchpad-provided.
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aifluency
      POSTGRES_PASSWORD: aifluency
      POSTGRES_DB: aifluency
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aifluency"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
