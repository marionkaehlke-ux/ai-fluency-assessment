apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- if .Values.ingress.enabled }}
  ingress:
    - ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: new-ingress
  {{- else }}
  ingress: []
  {{- end }}
  egress:
    # DNS is always required.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # RDS Postgres, Redis, SMTP relay, and the Anthropic API (HTTPS) within the VPC / out.
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 587
          protocol: TCP
        - port: 443
          protocol: TCP
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
