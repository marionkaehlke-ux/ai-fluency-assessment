replicaCount: 2

image:
  repository: 333070415076.dkr.ecr.eu-west-1.amazonaws.com/image/phrase/phrase-launchpad/ai-fluency-assessment/app
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {} # IRSA role-arn set at deploy time via --set

service:
  type: ClusterIP
  port: 80
  targetPort: 3000 # Fastify listens on PORT=3000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# HorizontalPodAutoscaler — min 2 / max 6, CPU target 70% (spec §9.3).
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Writable /tmp for the read-only root filesystem (PSS restricted).
extraVolumes:
  - name: tmp
    emptyDir: {}
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

# Non-secret configuration (12-factor; secrets are injected separately at deploy time).
env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3000"
  - name: CLAUDE_MODEL
    value: "claude-sonnet-4-6"
  - name: ANTHROPIC_VERSION
    value: "2023-06-01"
  - name: SCORING_PROMPT_VERSION
    value: "v1"
  - name: SCORING_ENABLED
    value: "true"
  - name: SLACK_NOTIFICATIONS_ENABLED
    value: "false"
  - name: ADMIN_CALIBRATOR_GROUP
    value: "phrase-people-ops"
  - name: CURRENT_CYCLE
    value: "2026-H1"
  - name: APP_BASE_URL
    value: "https://ai-fluency-assessment.launchpad.phrase-internal.com"
  - name: ELT_EMAILS
    value: "andrea.tabacchi@phrase.com,georg.ell@phrase.com,ian.woolley@phrase.com,jason.hemingway@phrase.com,martin.konop@phrase.com,marion.kaehlke@phrase.com,stephen.lumenta@phrase.com"

# Secret env vars — injected at deploy time via --set secrets.KEY=value. Never hard-code here.
secrets:
  ANTHROPIC_API_KEY: ""

networkPolicy:
  extraEgress: []

ingress:
  enabled: false
  hostname: ""
  gatewayName: ""
  gatewayNamespace: ""
  servicePort: 80
  oidc:
    enabled: false
    clientId: ""
    clientSecret: ""
    sessionSecret: ""
