# Non-secret ingress config (internal apisix gateway). OIDC is enabled so the gateway
# injects the X-Userinfo header (with groups) that the app's auth middleware relies on.
ingress:
  enabled: true
  hostname: "ai-fluency-assessment.launchpad.phrase-internal.com"
  gatewayName: "apisix"
  gatewayNamespace: "new-ingress"
  servicePort: 80
  oidc:
    enabled: true
