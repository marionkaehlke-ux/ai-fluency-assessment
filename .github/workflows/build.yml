name: Build

on:
  push:
    branches: [main]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: core-arc-ondemand-launchpad
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push
        uses: Phrase-Engineering/platform-core-reusable-actions/actions/build-test-push-container@main
        with:
          aws-account-map: '{"internal": "333070415076"}'
          ecr-repository: 333070415076.dkr.ecr.eu-west-1.amazonaws.com/image/phrase/phrase-launchpad/ai-fluency-assessment/app
          dockerfile-path: Dockerfile
          build-context: .
          additional-tags: "commit-${{ github.sha }}"
