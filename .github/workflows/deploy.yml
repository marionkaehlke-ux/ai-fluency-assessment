name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. commit-abc1234, defaults to latest build)"
        required: false

permissions:
  id-token: write
  contents: read
  actions: read # Required for gh run list (workflow_dispatch image tag fallback)

jobs:
  deploy:
    runs-on: core-arc-ondemand-launchpad
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS & configure kubectl
        uses: Phrase-Engineering/platform-core-reusable-actions/actions/aws-eks-auth@main
        with:
          aws-account-map: '{"launchpad": "882466794441"}'
          env: launchpad
          eks-cluster: launchpad-eu-west-1-main

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=commit-${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            LAST_SHA=$(gh run list --workflow=build.yml --limit=20 --json headSha,conclusion,headBranch \
              --jq '[.[] | select(.headBranch=="main" and .conclusion=="success")] | .[0].headSha')
            if [ -z "$LAST_SHA" ] || [ "$LAST_SHA" = "null" ]; then
              echo "Error: No successful build.yml run found on main. Run the build workflow on main first, or provide inputs.image_tag explicitly." >&2
              exit 1
            fi
            echo "value=commit-${LAST_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Retrieve database credentials from Secrets Manager
        run: |
          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "github/ai-fluency-assessment/database" \
            --query 'SecretString' --output text)
          DATABASE_URL=$(echo "$DB_SECRET" | jq -r '.database_url')
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

      - name: Deploy
        env:
          OKTA_CLIENT_ID: ${{ secrets.DEFAULT_OKTA_CLIENT_ID }}
          OKTA_CLIENT_SECRET: ${{ secrets.DEFAULT_OKTA_OIDC_SECRET }}
          SESSION_SECRET: ${{ secrets.DEFAULT_SESSION_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          helm upgrade --install ai-fluency-assessment ./deploy/chart/ \
            --namespace launchpad-ai-fluency-assessment \
            -f ./deploy/chart/values-ingress.yaml \
            --set image.tag=${{ steps.tag.outputs.value }} \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=arn:aws:iam::882466794441:role/irsa-launchpad-ai-fluency-assessment" \
            --set "ingress.oidc.clientId=${OKTA_CLIENT_ID}" \
            --set "ingress.oidc.clientSecret=${OKTA_CLIENT_SECRET}" \
            --set "ingress.oidc.sessionSecret=${SESSION_SECRET}" \
            --set "secrets.DATABASE_URL=${{ env.DATABASE_URL }}" \
            --set "secrets.ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
            --wait \
            --timeout 5m \
            --atomic
